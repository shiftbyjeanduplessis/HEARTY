<script id="hearty-name-onboarding-modal">
(function(){
  const NAME_KEY = 'heartyUserDisplayName';
  const DONE_KEY = 'heartyNameOnboardingDone';

  function createModal(){
    if(document.getElementById('heartyNameModal')) return;
    const modal = document.createElement('div');
    modal.id = 'heartyNameModal';
    modal.innerHTML = `
      <div style="position:fixed; inset:0; z-index:9998; background:rgba(15,23,42,.34); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="width:min(100%,420px); background:rgba(255,255,255,.96); border:1px solid rgba(143,163,184,.24); border-radius:28px; box-shadow:0 24px 70px rgba(15,23,42,.22); padding:24px; text-align:center;">
          <div style="font-size:.74rem; font-weight:800; letter-spacing:.16em; color:#6d7b8c; text-transform:uppercase; margin-bottom:10px;">Welcome</div>
          <h2 style="margin:0 0 8px; font-size:1.55rem; letter-spacing:-.04em; color:#102033;">What should we call you?</h2>
          <p style="margin:0 0 18px; color:#6d7b8c; line-height:1.45; font-size:.95rem;">This helps personalise your experience.</p>
          <input id="heartyNameInput" type="text" placeholder="Your name" autocomplete="given-name" style="width:100%; border:1px solid rgba(143,163,184,.32); border-radius:16px; padding:14px 15px; font:inherit; font-size:16px; outline:none; margin-bottom:12px;" />
          <button id="heartyNameContinue" type="button" style="width:100%; min-height:52px; border:none; border-radius:16px; cursor:pointer; font:inherit; font-weight:800; color:white; background:linear-gradient(180deg,#ff6b00,#2356c4); box-shadow:0 12px 24px rgba(47,109,246,.20);">Continue</button>
          <button id="heartyNameSkip" type="button" style="margin-top:10px; border:none; background:transparent; color:#6d7b8c; font:inherit; font-size:.86rem; cursor:pointer;">Not now</button>
        </div>
      </div>`;
    document.body.appendChild(modal);

    const input = document.getElementById('heartyNameInput');
    document.getElementById('heartyNameContinue').addEventListener('click', saveName);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') saveName(); });
    document.getElementById('heartyNameSkip').addEventListener('click', () => { modal.remove(); scrollToWelcomeBlock(); });
    setTimeout(() => input && input.focus(), 200);
  }

  async function saveName(){
    const input = document.getElementById('heartyNameInput');
    const name = (input?.value || '').trim();
    if(!name){ input.focus(); return; }
    localStorage.setItem(NAME_KEY, name);
    localStorage.setItem(DONE_KEY, 'true');

    try{
      const supabase = window.supabase || window.supabaseClient;
      if(supabase){
        const { data:{ user } } = await supabase.auth.getUser();
        if(user){
          await supabase.from('profiles').upsert({
            user_id: user.id,
            user_name: name,
            first_name: name.split(' ')[0],
            updated_at: new Date().toISOString()
          }, { onConflict:'user_id' });
        }
      }
    }catch(e){ console.warn('Name save failed locally only:', e); }

    updateGreeting(name);
    document.getElementById('heartyNameModal')?.remove();
    scrollToWelcomeBlock();
  }

  function updateGreeting(name){
    const headline = document.querySelector('.headline');
    if(headline && name) headline.textContent = `Good to see you, ${name}`;
  }

  function scrollToWelcomeBlock(){
    const block = document.getElementById('dailyRhythmCard') || document.getElementById('protocolCard') || document.querySelector('.protocol-card') || document.querySelector('[data-card="daily-rhythm"]');
    if(block){
      block.scrollIntoView({ behavior:'smooth', block:'center' });
      block.style.boxShadow = '0 0 0 4px rgba(255,107,0,.12), 0 22px 52px rgba(14,31,53,.14)';
      setTimeout(() => block.style.boxShadow = '', 2200);
    }
  }

  function init(){
    const savedName = localStorage.getItem(NAME_KEY);
    if(savedName) updateGreeting(savedName);
    if(localStorage.getItem(DONE_KEY) === 'true') return;
    createModal();
  }

  document.addEventListener('DOMContentLoaded', init);
  setTimeout(init, 500);
})();
</script>

<script id="remove-home-placeholder-data-and-badges">
(function(){
  function setText(sel, text){ const el = document.querySelector(sel); if(el) el.textContent = text; }

  function removeFakeMedication(){
    const card = document.getElementById('injectionCard');
    if(!card) return;
    ['medication','type','dosage','dueWeekday','nextDate','lastDate'].forEach(k => delete card.dataset[k]);
    card.classList.remove('due','logged');
    setText('#injectionCard .injection-title', 'No medication schedule set');
    setText('#injectionCard .injection-copy', 'Complete onboarding to add your medication, dose, and schedule. You can change this later in Settings.');
    const actions = document.getElementById('injectionActions');
    if(actions) actions.innerHTML = '<span class="compact-pill">Not set yet</span>';
  }

  function removeFakeProgress(){
    setText('#adherenceValue', '0%');
    setText('#waterValue', '0L');
    document.querySelectorAll('.ring-wrap').forEach(ring => { ring.dataset.progress = '0'; });
    document.querySelectorAll('.ring-progress').forEach(circle => { circle.style.strokeDashoffset = '339.292'; });
    document.querySelectorAll('.progress-main').forEach(el => { el.textContent = 'No weight progress logged yet'; });
    document.querySelectorAll('.progress-meta').forEach(el => {
      if(el.textContent.includes('kg') || el.textContent.includes('Goal')) el.textContent = 'Add your first weigh-in to begin tracking.';
    });
    const labels = document.querySelector('.goal-labels');
    if(labels) labels.innerHTML = '<span>Start not set</span><span>Next milestone not set</span><span>Goal set by your doctor</span>';
    const fill = document.querySelector('.goalbar-fill');
    if(fill) fill.style.width = '0%';
  }

  function removeFakeHydration(){
    setText('#waterGlassCount', '0 GLASSES');
    setText('#waterValue', '0L');
    const fill = document.getElementById('waterProgressFill');
    if(fill) fill.style.width = '0%';
  }

  function removeBadges(){
    ['#badgeCard','#badgesCard','#badgeBlock','#badgesBlock','#markerMiniRow','.badge-card','.badges-card','.badge-block','.badges-block']
      .forEach(sel => document.querySelectorAll(sel).forEach(el => el.remove()));
  }

  function run(){
    removeFakeMedication();
    removeFakeProgress();
    removeFakeHydration();
    setText('#protocolSummary', '0 of 4 complete');
    removeBadges();
  }

  document.addEventListener('DOMContentLoaded', run);
  setTimeout(run, 250);
  setTimeout(run, 1000);
})();
</script>

<script id="hearty-daily-lesson-card">
(function(){
  function findAnchor(){
    return document.getElementById('dailyRhythmCard') ||
      document.getElementById('protocolCard') ||
      document.querySelector('.protocol-card') ||
      document.querySelector('[data-card="daily-rhythm"]') ||
      document.querySelector('.layout .stack .card');
  }

  function renderLessonCard(){
    const state = window.HeartyLessonState;
    if(!state || state.isFinished()){
      document.getElementById('heartyLessonCard')?.remove();
      return;
    }

    const lesson = state.getCurrentLesson();
    if(!lesson) return;

    let card = document.getElementById('heartyLessonCard');
    if(!card){
      card = document.createElement('section');
      card.id = 'heartyLessonCard';
      card.className = 'card';
      card.style.background = 'linear-gradient(180deg, rgba(248,246,255,.98), rgba(255,255,255,.96))';
      card.style.borderColor = 'rgba(147,126,255,.22)';
      card.style.boxShadow = '0 16px 36px rgba(88,72,190,.08)';
      const anchor = findAnchor();
      if(anchor && anchor.parentNode) anchor.parentNode.insertBefore(card, anchor.nextSibling);
      else document.querySelector('.shell')?.appendChild(card);
    }

    const doneToday = state.completedToday();
    card.innerHTML = `
      <div class="section-label" style="color:#7467c8;">TODAY’S LESSON</div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap;">
        <div style="min-width:0; max-width:680px;">
          <div style="font-size:.86rem; font-weight:800; color:#7467c8; margin-bottom:5px;">Day ${lesson.day} of 10</div>
          <h3 style="margin:0 0 8px; font-size:1.16rem; letter-spacing:-.03em;">${lesson.title}</h3>
          <p style="margin:0; color:#6d7b8c; line-height:1.5; font-size:.92rem;">Small daily guidance to help you use Hearty well without feeling overwhelmed.</p>
        </div>
        <button id="heartyLessonToggle" type="button" class="ghost-btn">${card.dataset.open === 'true' ? 'Close' : 'Read lesson'}</button>
      </div>
      <div id="heartyLessonBody" style="display:${card.dataset.open === 'true' ? 'block' : 'none'}; margin-top:16px; padding:16px; border-radius:18px; background:rgba(255,255,255,.62); border:1px solid rgba(147,126,255,.14); color:#4f5f73; line-height:1.58; white-space:pre-line;">${lesson.body}</div>
      <div style="margin-top:14px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
        <div style="color:#6d7b8c; font-size:.86rem; font-weight:700;">${doneToday ? 'Today’s lesson complete. Next lesson unlocks tomorrow.' : 'One lesson is available per day.'}</div>
        <button id="heartyLessonComplete" type="button" class="soft-btn" ${doneToday ? 'disabled style="opacity:.55;cursor:not-allowed;"' : ''}>${doneToday ? 'Complete' : 'Mark complete'}</button>
      </div>`;

    document.getElementById('heartyLessonToggle')?.addEventListener('click', () => {
      card.dataset.open = card.dataset.open === 'true' ? 'false' : 'true';
      renderLessonCard();
    });

    document.getElementById('heartyLessonComplete')?.addEventListener('click', () => {
      if(doneToday) return;
      state.markComplete();
      renderLessonCard();
    });
  }

  document.addEventListener('DOMContentLoaded', renderLessonCard);
  setTimeout(renderLessonCard, 500);
})();
</script>
