<!DOCTYPE html>
<html lang="en" data-theme="clean_blue">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hearty — Meals Setup</title>
  <style>
    :root{
      --bg-1:#eef4fb; --bg-2:#f8fbff; --ink:#102033; --muted:#6d7b8c;
      --line:rgba(143,163,184,.24); --card:rgba(255,255,255,.94);
      --surface:linear-gradient(180deg,rgba(255,255,255,.98),rgba(247,250,255,.94));
      --shadow:0 18px 44px rgba(14,31,53,.10); --shadow-soft:0 8px 22px rgba(14,31,53,.06);
      --accent:#2f6df6; --teal:#22b8a7; --success:#16a34a;
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(1200px 500px at 0% -10%,rgba(47,109,246,.10),transparent 50%),radial-gradient(1000px 450px at 100% 0%,rgba(20,184,166,.08),transparent 45%),linear-gradient(180deg,var(--bg-2),var(--bg-1));overflow-x:hidden}
    .shell{max-width:900px;margin:0 auto;padding:20px 20px 110px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:88px;margin-bottom:18px;padding:0 18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.62));box-shadow:var(--shadow-soft);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .brand{display:flex;align-items:center;gap:8px;min-width:0;padding-left:8px}.brand-logo{display:block;height:48px;width:auto;object-fit:contain;max-width:min(72vw,300px)}
    .setup-card{background:var(--card);border:1px solid rgba(150,166,186,.18);border-radius:30px;box-shadow:var(--shadow);padding:26px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .progress-wrap{display:grid;gap:10px;margin-bottom:24px}.progress-meta{display:flex;justify-content:space-between;gap:12px;color:#7b8998;font-size:.76rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase}.progress-track{height:9px;border-radius:999px;overflow:hidden;background:#e8eef7;border:1px solid rgba(160,178,201,.20)}.progress-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#2f6df6,#22b8a7);transition:width .28s ease}
    .question{min-height:430px;display:grid;align-content:start;gap:18px}.kicker{font-size:.74rem;font-weight:800;letter-spacing:.17em;color:#7b8998;text-transform:uppercase}h1{margin:0;font-size:clamp(1.75rem,4vw,2.7rem);letter-spacing:-.05em;line-height:1.02}.question-copy{margin:0;color:var(--muted);line-height:1.55;max-width:44rem}
    .option-grid{display:grid;gap:10px;margin-top:4px}.option-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.option-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .option-btn{width:100%;min-height:58px;text-align:left;border-radius:18px;border:1px solid rgba(143,163,184,.22);background:var(--surface);color:var(--ink);box-shadow:0 8px 18px rgba(14,31,53,.04);padding:14px 16px;font:inherit;cursor:pointer;display:flex;justify-content:space-between;gap:14px;align-items:center;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}.option-btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(14,31,53,.07)}.option-btn.selected{border-color:rgba(47,109,246,.42);background:linear-gradient(180deg,rgba(233,242,255,.98),rgba(255,255,255,.96));box-shadow:0 0 0 4px rgba(47,109,246,.07),0 12px 24px rgba(14,31,53,.06)}
    .option-main{display:grid;gap:3px}.option-title{font-weight:800;letter-spacing:-.02em}.option-sub{color:var(--muted);font-size:.86rem;line-height:1.35}.check{width:22px;height:22px;border-radius:50%;border:1px solid rgba(143,163,184,.32);flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:.78rem;font-weight:900}.option-btn.selected .check{border-color:transparent;background:var(--accent)}
    .summary-grid{display:grid;gap:10px;margin-top:4px}.summary-row{display:grid;grid-template-columns:150px 1fr;gap:14px;padding:13px 14px;border-radius:16px;background:var(--surface);border:1px solid rgba(143,163,184,.16)}.summary-row span:first-child{color:var(--muted);font-weight:750}.summary-row span:last-child{font-weight:800}.tiny-note{font-size:.82rem;color:var(--muted);line-height:1.45;margin-top:4px}
    .nav-row{position:sticky;bottom:14px;z-index:10;display:flex;justify-content:space-between;gap:12px;margin-top:18px;padding:10px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line);box-shadow:0 12px 28px rgba(14,31,53,.10);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.btn{appearance:none;border:none;min-height:46px;border-radius:16px;padding:0 18px;font:inherit;font-weight:850;cursor:pointer;transition:transform .18s ease,opacity .18s ease}.btn:hover{transform:translateY(-1px)}.btn.secondary{color:#516174;background:#f4f7fb;border:1px solid rgba(160,178,201,.18)}.btn.primary{color:#fff;background:linear-gradient(180deg,#2f6df6,#1550b3);box-shadow:0 10px 20px rgba(47,109,246,.20)}.btn:disabled{opacity:.42;cursor:not-allowed;transform:none}
    @media(max-width:700px){.shell{padding:14px 14px 104px}.topbar{min-height:78px;border-radius:18px;padding:0 14px}.brand-logo{height:42px;max-width:min(68vw,230px)}.setup-card{padding:20px;border-radius:24px}.question{min-height:440px}.option-grid.two,.option-grid.three{grid-template-columns:1fr}.summary-row{grid-template-columns:1fr;gap:4px}.nav-row{bottom:10px}.btn{flex:1;padding:0 12px}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><img class="brand-logo" src="/hearty-logo.png" alt="Hearty" onerror="this.onerror=null;this.src='hearty-logo.png';" /></div></header>
    <section class="setup-card">
      <div class="progress-wrap"><div class="progress-meta"><span id="stepLabel">Step 1</span><span id="stepCount">1 / 9</span></div><div class="progress-track"><div class="progress-fill" id="progressFill"></div></div></div>
      <div class="question" id="question"></div>
      <div class="nav-row"><button class="btn secondary" type="button" id="backBtn">Back</button><button class="btn primary" type="button" id="nextBtn">Next</button></div>
    </section>
  </main>

  <script>
    (function(){
      'use strict';
      var stepIndex = 0;
      var state = {
        country:'south_africa',
        breakfastPreference:'optional',
        breakfastChoices:[],
        snackTiming:'mid_afternoon',
        snackChoices:[],
        proteins:[],
        starches:[],
        vegetables:[],
        leftoversLunch:true,
        snacksEnabled:true
      };

      var countries = [
        ['south_africa','South Africa','Uses local-friendly defaults like hake, snoek, tuna, sweet potato and familiar wording.'],
        ['australia','Australia','Uses local naming and common supermarket defaults.'],
        ['united_kingdom','United Kingdom','Uses UK wording and local-friendly defaults.'],
        ['united_states','United States','Uses US wording and local-friendly defaults.'],
        ['canada','Canada','Uses Canadian wording and local-friendly defaults.'],
        ['other','Other','Keeps the plan neutral and practical.']
      ];
      var proteins = [
        ['chicken','Chicken','Main meal protein.'],['beef','Beef','Main meal protein.'],['pork','Pork','Main meal protein.'],['fish','Fish','Local-friendly options where available.'],['seafood','Seafood','Prawns, seafood mixes and similar.'],['canned_tuna','Canned tuna','Written separately from fish for snacks and salads.'],['eggs','Eggs','Breakfasts and simple meals.'],['dairy','Dairy','Low-fat yoghurt and cottage cheese.'],['vegetarian','Vegetarian protein','Beans, lentils, tofu or similar where suitable.']
      ];
      var breakfasts = [
        ['eggs','Eggs','Usually 2 eggs with simple add-ins.'],['all_bran','All Bran / high-fibre cereal','Served as a bowl with low-fat milk.'],['oats','Cooked oats','Served as a bowl with low-fat milk.'],['overnight_oats','Overnight oats','Simple fridge-friendly option.'],['yoghurt_bowl','Low-fat yoghurt bowl','With fruit where selected.'],['smoothie','Smoothie / smoothie bowl','Only when selected.']
      ];
      var snacks = [
        ['low_fat_yoghurt','Low-fat yoghurt','Cup portion.'],['cottage_cheese','Cottage cheese','With crackers or rice cakes when suitable.'],['fruit','Fruit','Uses selected fruit defaults.'],['biltong','Biltong','Small handful.'],['nuts','Nuts and seeds','Small handful.'],['peanut_butter','Peanut butter','Controlled portion.'],['rice_cakes','Rice cakes / crackers','Simple snack base.'],['canned_tuna','Tuna snack','½ tin drained where suitable.']
      ];
      var starches = [
        ['sweet_potato','Sweet potato','Portion-based.'],['brown_rice','Brown rice','Portion-based.'],['couscous','Couscous','Portion-based.'],['whole_wheat_pasta','Whole wheat pasta','Portion-based.'],['potato','Potato / mash','Portion-based.'],['wrap','Whole wheat wrap','For wrap meals.'],['none','No regular starch preference','Engine can still use starch where needed.']
      ];
      var vegetables = [
        ['broccoli','Broccoli',''],['carrot','Carrot',''],['baby_marrow','Baby marrow / zucchini',''],['green_beans','Green beans',''],['spinach','Spinach',''],['mushrooms','Mushrooms',''],['peppers','Peppers',''],['salad','Salad vegetables','']
      ];

      var steps = [
        {key:'country', kind:'single', title:'Which country are you in?', copy:'This is only for ingredient names, common supermarket defaults and local fish suggestions. It is not a cuisine-style selector.', options:countries},
        {key:'breakfastPreference', kind:'single', title:'Do you want breakfast in the plan?', copy:'The engine can include breakfast, skip it, or keep it flexible.', options:[['yes','Yes','Include breakfast most days.'],['no','No','Do not force breakfast.'],['optional','Optional','Allow light/simple breakfasts where useful.']]},
        {key:'breakfastChoices', kind:'multi', title:'Which breakfasts should the engine use?', copy:'Breakfasts stay simple. Cereal and oats are bowls with low-fat milk.', options:breakfasts},
        {key:'snackTiming', kind:'single', title:'When do you usually snack?', copy:'This sets timing only. You can still switch snacks off below.', options:[['none','I do not snack','No planned snacks by default.'],['morning','Morning','Morning snack.'],['mid_afternoon','Mid-afternoon','Afternoon snack.'],['both','Morning and afternoon','Two snack slots when needed.']]},
        {key:'snackChoices', kind:'multi', title:'Which snacks do you like?', copy:'The engine uses these as controlled portions, especially on support days.', options:snacks},
        {key:'proteins', kind:'multi', title:'Which proteins do you enjoy?', copy:'Choose all proteins you actually want to see in your plan. This list maps to the meal engine, including canned tuna as separate from fish.', options:proteins, min:1},
        {key:'starches', kind:'multi', title:'Which starches work for you?', copy:'The meal engine uses simple portion-based starches, not complicated gram rules on the page.', options:starches},
        {key:'vegetables', kind:'multi', title:'Which vegetables are okay?', copy:'Choose practical vegetables the engine can rotate through meals.', options:vegetables},
        {key:'review', kind:'review', title:'Review meal setup', copy:'This will save a full meal-engine profile and return to Meals.'}
      ];

      function $(id){return document.getElementById(id)}
      function labelFor(list, value){var item=list.find(function(x){return x[0]===value});return item?item[1]:value}
      function labelsFor(list, values){return (values||[]).map(function(v){return labelFor(list,v)}).join(', ') || 'None selected'}
      function current(){return steps[stepIndex]}
      function canNext(){var s=current(); if(s.kind==='review') return true; var v=state[s.key]; if(s.kind==='multi' && s.min) return Array.isArray(v) && v.length>=s.min; return true}

      function render(){
        var s=current();
        $('stepLabel').textContent='Step '+(stepIndex+1);
        $('stepCount').textContent=(stepIndex+1)+' / '+steps.length;
        $('progressFill').style.width=((stepIndex+1)/steps.length*100)+'%';
        $('backBtn').disabled=stepIndex===0;
        $('nextBtn').textContent=s.kind==='review'?'Save setup':'Next';
        $('nextBtn').disabled=!canNext();
        var html='<div class="kicker">Meal setup</div><h1>'+s.title+'</h1><p class="question-copy">'+s.copy+'</p>';
        if(s.kind==='single' || s.kind==='multi'){
          html+='<div class="option-grid two">';
          s.options.forEach(function(o){
            var selected=s.kind==='single' ? state[s.key]===o[0] : (state[s.key]||[]).indexOf(o[0])>-1;
            html+='<button class="option-btn '+(selected?'selected':'')+'" type="button" data-value="'+o[0]+'"><span class="option-main"><span class="option-title">'+o[1]+'</span><span class="option-sub">'+(o[2]||'')+'</span></span><span class="check">'+(selected?'✓':'')+'</span></button>';
          });
          html+='</div>';
        } else {
          html+='<div class="summary-grid">'+
            '<div class="summary-row"><span>Country</span><span>'+labelFor(countries,state.country)+'</span></div>'+
            '<div class="summary-row"><span>Breakfast</span><span>'+state.breakfastPreference+' — '+labelsFor(breakfasts,state.breakfastChoices)+'</span></div>'+
            '<div class="summary-row"><span>Snacks</span><span>'+labelFor([['none','None'],['morning','Morning'],['mid_afternoon','Mid-afternoon'],['both','Morning and afternoon']],state.snackTiming)+' — '+labelsFor(snacks,state.snackChoices)+'</span></div>'+
            '<div class="summary-row"><span>Proteins</span><span>'+labelsFor(proteins,state.proteins)+'</span></div>'+
            '<div class="summary-row"><span>Starches</span><span>'+labelsFor(starches,state.starches)+'</span></div>'+
            '<div class="summary-row"><span>Vegetables</span><span>'+labelsFor(vegetables,state.vegetables)+'</span></div>'+
            '</div><p class="tiny-note">Country affects ingredient naming and local defaults only. It does not force a cuisine style.</p>';
        }
        $('question').innerHTML=html;
      }

      function toggle(value){
        var s=current();
        if(s.kind==='single'){
          state[s.key]=value;
          if(s.key==='snackTiming') state.snacksEnabled=value!=='none';
        } else if(s.kind==='multi'){
          var arr=state[s.key]||[];
          if(value==='none') arr=['none'];
          else {
            arr=arr.filter(function(x){return x!=='none'});
            var idx=arr.indexOf(value);
            if(idx>-1) arr.splice(idx,1); else arr.push(value);
          }
          state[s.key]=arr;
        }
        render();
      }

      function saveAndExit(){
        var now=new Date().toISOString();
        var profile={
          profileComplete:true,
          completedAt:now,
          source:'meals-onboarding',
          country:state.country,
          countryCode:state.country,
          dietaryPreference:'meat_or_flexible',
          breakfastPreference:state.breakfastPreference,
          breakfastChoices:state.breakfastChoices,
          snacksEnabled:state.snacksEnabled,
          snackTiming:state.snackTiming,
          snackChoices:state.snackChoices,
          proteins:state.proteins,
          selectedProteins:state.proteins,
          starches:state.starches,
          selectedStarches:state.starches,
          vegetables:state.vegetables,
          selectedVegetables:state.vegetables,
          leftoversLunch:state.leftoversLunch,
          useLeftoversForLunch:state.leftoversLunch,
          units:'portion',
          milkDefault:'low_fat_milk',
          breakfastUnitRule:'bowl_except_eggs',
          countryAffects:'ingredient_names_local_defaults_not_cuisine_style'
        };
        var wrapper={profileComplete:true,completedAt:now,preferences:profile,onboarding:profile,profile:profile,mealProfile:profile,currentDay:1,generatedWeek:null};
        try{
          localStorage.setItem('heartyMealsPageStateVFinal', JSON.stringify(wrapper));
          localStorage.setItem('heartyMealsStateV1', JSON.stringify(wrapper));
          localStorage.setItem('heartyMealsOnboardingComplete','true');
          localStorage.setItem('heartyMealsProfile', JSON.stringify(profile));
        }catch(e){console.warn('[Hearty Meals Setup] Save failed',e)}
        window.location.href='meals.html';
      }

      document.addEventListener('click',function(e){
        var opt=e.target.closest('.option-btn'); if(opt) toggle(opt.getAttribute('data-value'));
      });
      $('backBtn').addEventListener('click',function(){ if(stepIndex>0){stepIndex--; render();} });
      $('nextBtn').addEventListener('click',function(){ if(!canNext()) return; if(current().kind==='review') saveAndExit(); else {stepIndex++; render();} });
      render();
    })();
  </script>
</body>
</html>
