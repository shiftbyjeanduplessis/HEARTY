<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hearty Login</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f7fbff, #eef5fb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #123;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(180,200,220,0.5);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(50,80,110,0.18);
      padding: 32px 26px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #5d6f7e;
      font-size: 15px;
      margin-bottom: 26px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 16px;
      border: 1px solid #d7e2ec;
      padding: 15px 16px;
      font-size: 16px;
      margin-bottom: 14px;
      outline: none;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .primary {
      background: #1167d8;
      color: white;
      box-shadow: 0 12px 24px rgba(17,103,216,0.25);
    }

    .ghost {
      background: white;
      color: #123;
      border: 1px solid #d7e2ec;
    }

    .message {
      margin-top: 18px;
      font-size: 14px;
      color: #5d6f7e;
      min-height: 22px;
    }
  </style>

<style id="hearty-layer-2-page-intro-unification">
/* Layer 2: unify the first page intro block across all app pages. No engines or page logic changed. */
.shell > .page-header,
.shell > .status-strip,
.shell main > .section-intro,
main.stack > .hero{
  position:relative !important;
  margin:0 0 18px !important;
  padding:24px !important;
  border-radius:28px !important;
  border:1px solid var(--line) !important;
  background:var(--card) !important;
  box-shadow:var(--shadow) !important;
  backdrop-filter:blur(10px) !important;
  -webkit-backdrop-filter:blur(10px) !important;
  overflow:hidden !important;
}
.shell > .page-header::before,
.shell > .status-strip::before,
.shell main > .section-intro::before,
main.stack > .hero::before{
  content:"" !important;
  position:absolute !important;
  inset:0 0 auto 0 !important;
  height:1px !important;
  background:linear-gradient(90deg, rgba(255,255,255,.95), rgba(255,255,255,0)) !important;
  pointer-events:none !important;
}
.shell > .status-strip,
.shell > .page-header{
  display:flex !important;
  align-items:flex-start !important;
  justify-content:space-between !important;
  gap:18px !important;
  flex-wrap:wrap !important;
}
.shell main > .section-intro{
  display:block !important;
}
main.stack > .hero{
  display:block !important;
}
.shell > .page-header .kicker,
.shell > .page-header .progress-kicker,
.shell > .status-strip .eyebrow,
.shell main > .section-intro::before,
main.stack > .hero .section-label{
  font-size:.74rem !important;
  font-weight:800 !important;
  letter-spacing:.17em !important;
  color:var(--muted) !important;
  text-transform:uppercase !important;
  margin-bottom:12px !important;
}
.shell > .page-header .page-title,
.shell > .page-header .page-greeting,
.shell > .status-strip .headline,
.shell main > .section-intro h1,
main.stack > .hero h1{
  margin:0 0 10px !important;
  font-size:clamp(1.7rem, 3vw, 2.5rem) !important;
  line-height:1.02 !important;
  letter-spacing:-.04em !important;
  font-weight:680 !important;
  color:var(--ink) !important;
}
.shell > .page-header .page-copy,
.shell > .page-header .page-header-subcopy,
.shell > .status-strip .subline,
.shell main > .section-intro p,
main.stack > .hero p{
  margin:0 !important;
  max-width:42rem !important;
  color:var(--muted) !important;
  font-size:1rem !important;
  line-height:1.55 !important;
  font-weight:500 !important;
}
.shell > .status-strip .day-pill,
.shell > .page-header .status-pill,
main.stack > .hero .location-toggle{
  align-self:flex-start !important;
  margin-top:2px !important;
}
/* Social had its intro outside the card language; keep it visually identical to Settings. */
.shell main > .section-intro h1 + p{margin-top:0 !important;}
@media (max-width:760px){
  .shell > .page-header,
  .shell > .status-strip,
  .shell main > .section-intro,
  main.stack > .hero{
    padding:18px !important;
    border-radius:22px !important;
    margin-bottom:16px !important;
  }
  .shell > .page-header,
  .shell > .status-strip{
    flex-direction:column !important;
    align-items:flex-start !important;
    gap:12px !important;
  }
  .shell > .status-strip .day-pill,
  .shell > .page-header .status-pill{
    width:auto !important;
  }
}
</style>


<!-- =========================================================
  Layer 4: Authoritative Theme System
  Purpose: one shared theme reader/writer across all pages.
  Does not change page content or app logic.
========================================================= -->
<script id="hearty-layer4-theme-authority">
(function(){
  var VALID = ['clean_blue','sunlit','midnight','rose_aurora'];
  var DEFAULT_THEME = 'clean_blue';
  var USER_SELECTED_KEY = 'heartyThemeUserSelected';
  function valid(t){ return VALID.indexOf(t) >= 0 ? t : DEFAULT_THEME; }
  function firstUse(){ try { return localStorage.getItem('heartyCoreSetupDone') !== 'true'; } catch(e){ return false; } }
  function readTheme(){
    try{
      var userPicked = localStorage.getItem(USER_SELECTED_KEY) === 'true';
      if(firstUse() && !userPicked) return DEFAULT_THEME;
      return valid(localStorage.getItem('heartyTheme') || localStorage.getItem('hearty-theme') || document.documentElement.getAttribute('data-theme') || DEFAULT_THEME);
    }catch(e){ return valid(document.documentElement.getAttribute('data-theme') || DEFAULT_THEME); }
  }
  function syncLogo(theme){
    try{
      var logo = document.querySelector('.brand-logo');
      if(!logo) return;
      var src = logo.getAttribute('data-default-logo') || logo.getAttribute('src');
      if(theme === 'sunlit' && logo.getAttribute('data-sunlit-logo')) src = logo.getAttribute('data-sunlit-logo');
      if(theme === 'midnight' && logo.getAttribute('data-midnight-logo')) src = logo.getAttribute('data-midnight-logo');
      if(theme === 'rose_aurora' && logo.getAttribute('data-rose-aurora-logo')) src = logo.getAttribute('data-rose-aurora-logo');
      if(src) logo.setAttribute('src', src);
      document.documentElement.classList.add('logo-ready');
    }catch(e){}
  }
  function paintTheme(theme, opts){
    theme = valid(theme); opts = opts || {};
    document.documentElement.setAttribute('data-theme', theme);
    if(document.body) document.body.setAttribute('data-theme', theme);
    try{
      localStorage.setItem('heartyTheme', theme);
      localStorage.setItem('hearty-theme', theme);
      if(opts.userSelected) localStorage.setItem(USER_SELECTED_KEY, 'true');
    }catch(e){}
    try{
      document.querySelectorAll('.theme-option[data-theme], [data-theme-choice]').forEach(function(el){
        var choice = el.getAttribute('data-theme') || el.getAttribute('data-theme-choice');
        var on = choice === theme;
        el.classList.toggle('active', on);
        el.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      document.querySelectorAll('select[name="theme"], #themeSelect, .theme-select').forEach(function(sel){ if(sel.value !== theme) sel.value = theme; });
    }catch(e){}
    syncLogo(theme);
  }
  window.heartyApplyTheme = function(theme){ paintTheme(theme, {userSelected:true}); };
  window.heartyReadTheme = readTheme;
  paintTheme(readTheme(), {userSelected:false});
  document.addEventListener('DOMContentLoaded', function(){ paintTheme(readTheme(), {userSelected:false}); }, true);
  requestAnimationFrame(function(){ paintTheme(readTheme(), {userSelected:false}); });
  document.addEventListener('click', function(e){
    var btn = e.target && e.target.closest ? e.target.closest('.theme-option[data-theme], [data-theme-choice]') : null;
    if(btn){ paintTheme(btn.getAttribute('data-theme') || btn.getAttribute('data-theme-choice'), {userSelected:true}); }
  }, true);
  document.addEventListener('change', function(e){
    var t = e.target;
    if(t && (t.matches('select[name="theme"]') || t.matches('#themeSelect') || t.matches('.theme-select') || t.matches('[data-theme-input]'))){ paintTheme(t.value, {userSelected:true}); }
  }, true);
  window.addEventListener('storage', function(e){
    if(e.key === 'heartyTheme' || e.key === 'hearty-theme' || e.key === USER_SELECTED_KEY || e.key === 'heartyCoreSetupDone'){ paintTheme(readTheme(), {userSelected:false}); }
  });
})();
</script>

<body>
  <main class="auth-card">
    <div class="logo">Hearty</div>
    <div class="subtitle">
      Sign in to continue your GLP-1 companion journey.
    </div>

    <input id="email" type="email" placeholder="Email address" autocomplete="email" />

    <button class="primary" id="sendBtn">
      Send login link
    </button>

    <button class="ghost" id="googleBtn">
      Continue with Google
    </button>

    <button class="ghost" id="appleBtn">
      Continue with Apple
    </button>

    <div class="message" id="message"></div>
  </main>

  <script type="module">
    import { supabase } from "./supabase-client.js";

    const emailInput = document.getElementById("email");
    const sendBtn = document.getElementById("sendBtn");
    const googleBtn = document.getElementById("googleBtn");
    const appleBtn = document.getElementById("appleBtn");
    const message = document.getElementById("message");

    async function ensureProfile() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return;

      const provider = user.app_metadata?.provider || "email";

      await supabase.from("profiles").upsert({
        id: user.id,
        email: user.email,
        full_name: user.user_metadata?.full_name || null,
        avatar_url: user.user_metadata?.avatar_url || null,
        auth_provider: provider,
        updated_at: new Date().toISOString()
      });
    }

    async function redirectIfLoggedIn() {
      const { data: { session } } = await supabase.auth.getSession();

      if (session) {
        await ensureProfile();
        window.location.href = "./home.html";
      }
    }

    sendBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();

      if (!email) {
        message.textContent = "Please enter your email address.";
        return;
      }

      sendBtn.disabled = true;
      message.textContent = "Sending login link...";

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: `${window.location.origin}/auth.html`
        }
      });

      if (error) {
        message.textContent = error.message;
        sendBtn.disabled = false;
        return;
      }

      message.textContent = "Check your email and click the login link.";
      sendBtn.disabled = false;
    });

    googleBtn.addEventListener("click", async () => {
      await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: `${window.location.origin}/auth.html`
        }
      });
    });

    appleBtn.addEventListener("click", async () => {
      await supabase.auth.signInWithOAuth({
        provider: "apple",
        options: {
          redirectTo: `${window.location.origin}/auth.html`
        }
      });
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
