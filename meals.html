<!DOCTYPE html>
<html lang="en" data-theme="clean_blue">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Hearty — Meals</title>

<script>
(function(){
  function read(key){
    try{ return JSON.parse(localStorage.getItem(key)); }catch(e){ return null;}
  }

  function hasProfile(){
    var s =
      read("heartyMealsPageStateVFinal") ||
      read("heartyMealsStateVFinal") ||
      read("heartyMealsStateV1");

    if(!s) return false;
    var p = s.preferences || s.profile || s;
    return Object.keys(p||{}).length > 2;
  }

  if(!hasProfile()){
    window.location.replace("meals-onboarding.html");
  }
})();
</script>

<style>
:root{
  --bg:#f4f7fb;
  --card:#fff;
  --ink:#132235;
  --muted:#6f7c8d;
  --line:#e3eaf3;
  --blue:#2f6df6;
  --teal:#22b8a7;
  --orange:#f59e0b;
}

/* layout */
body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--ink);}
.shell{max-width:1100px;margin:auto;padding:20px}

/* header */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.brand-logo{height:40px}

/* header text */
.eyebrow{font-size:12px;color:var(--muted);letter-spacing:.2em}
.headline{font-size:28px;font-weight:800;margin:6px 0}
.subline{color:var(--muted)}

/* support pill */
.support-pill{
  padding:8px 14px;
  border-radius:999px;
  font-weight:700;
  display:inline-flex;
  align-items:center;
  gap:8px;
  border:1px solid var(--line);
}

.support-pill::before{
  content:"";
  width:8px;height:8px;border-radius:50%;
}

/* ON = ORANGE GLOW */
.support-pill.is-on{
  background:#fff6e6;
  color:#8a3d00;
}
.support-pill.is-on::before{
  background:var(--orange);
  box-shadow:0 0 12px var(--orange);
  animation:pulse 1.5s infinite;
}

/* OFF = GREY */
.support-pill.is-off{
  background:#fff;
  color:var(--muted);
}
.support-pill.is-off::before{
  background:#bbb;
}

/* animation */
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

/* cards */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
}

/* controls */
.control-row{
  display:flex;
  justify-content:space-between;
  margin:12px 0;
}

.switch{
  width:50px;height:28px;
  border-radius:999px;
  background:#ccc;
  position:relative;
  cursor:pointer;
}
.switch span{
  position:absolute;
  top:3px;left:3px;
  width:22px;height:22px;
  background:#fff;border-radius:50%;
  transition:.2s;
}
.switch.on{
  background:linear-gradient(45deg,var(--blue),var(--teal));
}
.switch.on span{
  left:25px;
}

/* buttons */
.btn{
  padding:10px 14px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.btn-blue{
  background:var(--blue);
  color:#fff;
}

.btn-orange{
  background:#ffe2b3;
  color:#8a3d00;
}

/* meals */
.meal{
  border-top:1px solid var(--line);
  padding:12px 0;
}

/* protein */
.protein{
  text-align:center;
  font-weight:800;
  font-size:18px;
}

</style>
</head>

<body>
<div class="shell">

<!-- HEADER -->
<div class="topbar">
  <img src="hearty-logo.png" class="brand-logo">
  <div class="support-pill is-off" id="supportPill">Support Off</div>
</div>

<div class="eyebrow">MEAL PLANNER</div>
<div class="headline">Your meals for today</div>
<div class="subline">Simple meals that adjust when you need support.</div>

<!-- PROTEIN -->
<div class="card">
  <div class="protein" id="proteinText">0 / 3 protein meals</div>
</div>

<!-- SETTINGS -->
<div class="card">
  <div class="control-row">
    <div>Support Mode</div>
    <button class="btn btn-orange" id="supportOffBtn">Turn Off</button>
  </div>

  <div class="control-row">
    <div>Snacks</div>
    <div class="switch on" id="snackToggle"><span></span></div>
  </div>
</div>

<!-- MEALS -->
<div class="card" id="meals">
  <div class="meal">Breakfast (loading...)</div>
  <div class="meal">Lunch (loading...)</div>
  <div class="meal">Dinner (loading...)</div>
</div>

<!-- SHOPPING -->
<div class="card">
  <button class="btn btn-blue" id="pdfBtn">Download Shopping PDF</button>
</div>

</div>

<script>

/* SUPPORT */
function getSupport(){
  try{
    var s = JSON.parse(localStorage.getItem("heartySupportMode"));
    return s && s.isActive;
  }catch(e){return false;}
}

function setSupport(off){
  localStorage.setItem("heartySupportMode", JSON.stringify({
    isActive:!off
  }));
  updateSupport();
}

function updateSupport(){
  const pill = document.getElementById("supportPill");
  const on = getSupport();

  pill.classList.toggle("is-on", on);
  pill.classList.toggle("is-off", !on);
  pill.innerText = on ? "Support On" : "Support Off";
}

document.getElementById("supportOffBtn").onclick = () => setSupport(true);

/* SNACK TOGGLE */
const snackToggle = document.getElementById("snackToggle");

function getSnacks(){
  return localStorage.getItem("snacks") !== "off";
}

function setSnacks(v){
  localStorage.setItem("snacks", v ? "on" : "off");
}

function syncSnack(){
  const on = getSnacks();
  snackToggle.classList.toggle("on", on);
}

snackToggle.onclick = () => {
  setSnacks(!getSnacks());
  syncSnack();
};

/* PDF */
document.getElementById("pdfBtn").onclick = () => {
  window.print();
};

/* INIT */
updateSupport();
syncSnack();

</script>

</body>
</html>
