<!DOCTYPE html>
<html lang="en" data-theme="clean_blue">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Hearty — Meals Setup</title>
  <style>
    :root{--bg-1:#eef4fb;--bg-2:#f8fbff;--ink:#102033;--muted:#6d7b8c;--line:rgba(143,163,184,.24);--card:rgba(255,255,255,.94);--shadow:0 18px 44px rgba(14,31,53,.10);--shadow-soft:0 8px 22px rgba(14,31,53,.06);--accent:#2f6df6;--teal:#22b8a7}
    *{box-sizing:border-box}html,body{margin:0;padding:0}body{min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(1200px 500px at 0% -10%,rgba(47,109,246,.10),transparent 50%),radial-gradient(1000px 450px at 100% 0%,rgba(20,184,166,.08),transparent 45%),linear-gradient(180deg,var(--bg-2),var(--bg-1));overflow-x:hidden}.shell{max-width:860px;margin:0 auto;padding:20px 20px 110px}.topbar{display:flex;align-items:center;justify-content:space-between;min-height:88px;margin-bottom:18px;padding:0 18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.66));box-shadow:var(--shadow-soft);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.brand{display:flex;align-items:center;min-width:0;padding-left:8px}.brand-logo{display:block;height:48px;width:auto;object-fit:contain;object-position:left center;max-width:min(72vw,300px)}.setup-card{position:relative;overflow:hidden;background:var(--card);border:1px solid rgba(150,166,186,.18);border-radius:30px;box-shadow:var(--shadow);padding:26px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.progress-wrap{display:grid;gap:10px;margin-bottom:24px}.progress-meta{display:flex;justify-content:space-between;gap:12px;color:#7b8998;font-size:.76rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase}.progress-track{height:9px;border-radius:999px;overflow:hidden;background:#e8eef7;border:1px solid rgba(160,178,201,.20)}.progress-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#2f6df6,#22b8a7);transition:width .28s ease}.question{min-height:430px;display:grid;align-content:start;gap:18px}.kicker{font-size:.74rem;font-weight:800;letter-spacing:.17em;color:#7b8998;text-transform:uppercase}h1{margin:0;font-size:clamp(1.75rem,4vw,2.7rem);letter-spacing:-.05em;line-height:1.02}.question-copy{margin:0;color:var(--muted);line-height:1.55;max-width:42rem}.option-grid{display:grid;gap:10px;margin-top:4px}.option-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.option-btn{width:100%;min-height:58px;text-align:left;border-radius:18px;border:1px solid rgba(143,163,184,.22);background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(247,250,255,.94));color:var(--ink);box-shadow:0 8px 18px rgba(14,31,53,.04);padding:14px 16px;font:inherit;cursor:pointer;display:flex;justify-content:space-between;gap:14px;align-items:center;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}.option-btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(14,31,53,.07)}.option-btn.selected{border-color:rgba(47,109,246,.38);background:linear-gradient(180deg,rgba(233,242,255,.98),rgba(255,255,255,.96));box-shadow:0 0 0 4px rgba(47,109,246,.07),0 12px 24px rgba(14,31,53,.06)}.option-main{display:grid;gap:3px}.option-title{font-weight:800;letter-spacing:-.02em}.option-sub{color:var(--muted);font-size:.86rem;line-height:1.35}.option-sub:empty{display:none}.check{width:22px;height:22px;border-radius:50%;border:1px solid rgba(143,163,184,.32);flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:.78rem;font-weight:900}.option-btn.selected .check{border-color:transparent;background:var(--accent)}.summary-grid{display:grid;gap:10px;margin-top:4px}.summary-row{display:flex;justify-content:space-between;gap:14px;padding:13px 14px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(247,250,255,.94));border:1px solid rgba(143,163,184,.16)}.summary-row span:first-child{color:var(--muted);font-weight:750}.summary-row span:last-child{text-align:right;font-weight:800;text-transform:capitalize}.nav-row{position:sticky;bottom:14px;z-index:10;display:flex;justify-content:space-between;gap:12px;margin-top:18px;padding:10px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid var(--line);box-shadow:0 12px 28px rgba(14,31,53,.10);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}.btn{appearance:none;border:none;min-height:46px;border-radius:16px;padding:0 18px;font:inherit;font-weight:850;cursor:pointer;transition:transform .18s ease,opacity .18s ease}.btn:hover{transform:translateY(-1px)}.btn.secondary{color:#516174;background:#f4f7fb;border:1px solid rgba(160,178,201,.18)}.btn.primary{color:#fff;background:linear-gradient(180deg,#2f6df6,#1550b3);box-shadow:0 10px 20px rgba(47,109,246,.20)}.btn:disabled{opacity:.42;cursor:not-allowed;transform:none}@media(max-width:700px){.shell{padding:14px 14px 104px}.topbar{min-height:78px;border-radius:18px;padding:0 14px}.brand-logo{height:42px;max-width:min(68vw,230px)}.setup-card{padding:20px;border-radius:24px}.question{min-height:440px}.option-grid.two{grid-template-columns:1fr}.nav-row{bottom:10px}.btn{flex:1;padding:0 12px}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><img class="brand-logo" src="/hearty-logo.png" alt="Hearty" onerror="this.onerror=null;this.src='hearty-logo.png';" /></div></header>
    <section class="setup-card" data-onboarding-root></section>
  </main>
  <script>
    (function(){
      "use strict";
      const ONBOARDING_KEY="heartyMealsOnboardingV1",UI_STATE_KEY="heartyMealsStateV1",PAGE_STATE_KEY="heartyMealsPageStateVFinal",PROFILE_KEY="heartyMealsProfile";
      const countryLabels={ZA:"South Africa",AU:"Australia",UK:"United Kingdom",US:"United States",CA:"Canada",OTHER:"Other"};
      const state=Object.assign({step:0,country:null,dietType:"omnivore",proteins:[],breakfast:[],starches:[],vegetables:[],fruits:[],snackPreferences:[]},load()||{});
      const steps=[
        {id:"country",kicker:"Step 1",title:"Select your country",copy:"This only helps Hearty use familiar ingredient names and local food defaults.",type:"single",key:"country",options:[["ZA","South Africa",""],["AU","Australia",""],["UK","United Kingdom",""],["US","United States",""],["CA","Canada",""],["OTHER","Other",""]]},
        {id:"dietType",kicker:"Step 2",title:"How do you eat?",copy:"Choose the closest option for your normal meal plan.",type:"single",key:"dietType",options:[["omnivore","I eat meat","Includes chicken, beef, pork, fish, tuna and eggs where selected."],["vegetarian","Vegetarian","Uses eggs, legumes, tofu and plant-based options where selected."]]},
        {id:"proteins",kicker:"Step 3",title:"Which proteins do you enjoy?",copy:"Choose the main proteins you want the meal engine to use.",type:"multi",key:"proteins",dynamicOptions:getProteinOptions},
        {id:"breakfast",kicker:"Step 4",title:"Which breakfasts do you enjoy?",copy:"Breakfast is part of the plan. Choose what you are happy to see.",type:"multi",key:"breakfast",options:[["eggs","Eggs","Written as 2 eggs."],["all_bran","All Bran / Bran Flakes","Served as a bowl with low-fat milk."],["oats","Cooked oats","Served as a bowl with low-fat milk."],["overnight_oats","Overnight oats","Made with low-fat milk."],["yoghurt_bowl","Low-fat yoghurt bowl","Yoghurt with fruit where selected."]]},
        {id:"starches",kicker:"Step 5",title:"Which starches do you enjoy?",copy:"Hearty uses one starch portion where the meal needs it.",type:"multi",key:"starches",options:[["rice","Rice",""],["potato","Potato",""],["sweet_potato","Sweet potato",""],["couscous","Couscous",""],["whole_wheat_pasta","Whole wheat pasta",""],["whole_wheat_wraps","Whole wheat wraps",""],["whole_wheat_bread","Whole wheat bread / toast",""]]},
        {id:"vegetables",kicker:"Step 6",title:"Which vegetables do you enjoy?",copy:"Choose enough options so the engine can rotate realistic vegetable combinations.",type:"multi",key:"vegetables",options:[["broccoli","Broccoli",""],["cauliflower","Cauliflower",""],["carrots","Carrots",""],["baby_marrow","Baby marrow / zucchini",""],["spinach","Spinach",""],["mushrooms","Mushrooms",""],["peppers","Peppers",""],["green_beans","Green beans",""],["corn","Corn",""],["butternut","Butternut",""],["cabbage","Cabbage",""],["lettuce","Lettuce / salad greens",""],["cucumber","Cucumber",""],["tomato","Tomato",""],["onion","Onion",""],["peas","Peas",""],["mixed_veg","Mixed vegetables",""]]},
        {id:"fruits",kicker:"Step 7",title:"Which fruits do you like?",copy:"Used for breakfast bowls and snack suggestions.",type:"multi",key:"fruits",allowSkip:true,options:[["apple","Apple",""],["banana","Banana",""],["orange","Orange",""],["grapes","Grapes",""],["peach","Peach",""],["strawberries","Strawberries",""],["blueberries","Blueberries",""],["raspberries","Raspberries",""],["pineapple","Pineapple",""],["pawpaw","Pawpaw / papaya",""],["kiwi","Kiwi fruit",""],["grapefruit","Grapefruit",""]]},
        {id:"snackPreferences",kicker:"Step 8",title:"Which snacks do you prefer?",copy:"This does not switch snacks on. It only saves your snack preferences for the generator.",type:"multi",key:"snackPreferences",allowSkip:true,options:[["low_fat_yoghurt","Low-fat yoghurt",""],["cottage_cheese","Cottage cheese",""],["fruit","Fruit",""],["biltong","Biltong",""],["nuts_seeds","Nuts and seeds",""],["peanut_butter","Peanut butter",""],["rice_cakes","Rice cakes",""],["wholegrain_crackers","Wholegrain crackers",""],["boiled_eggs","Boiled eggs",""],["tuna_rice_cakes","Tuna on rice cakes",""]]},
        {id:"summary",kicker:"Final step",title:"Your meal setup is ready.",copy:"Hearty will use this setup to generate simple, realistic meals around your preferences.",type:"summary"}
      ];
      const root=document.querySelector("[data-onboarding-root]");
      function getProteinOptions(){return state.dietType==="vegetarian"?[["eggs","Eggs",""],["legumes","Legumes","Lentils, beans and chickpeas."],["tofu","Tofu",""],["plant_based","Plant-based meat alternatives",""]]:[["chicken","Chicken",""],["beef","Beef",""],["pork","Pork",""],["fish","Fish",""],["seafood","Seafood",""],["canned_tuna","Canned tuna",""],["eggs","Eggs",""],["turkey","Turkey",""]];}
      function render(){const step=steps[state.step];const progress=Math.round(((state.step+1)/steps.length)*100);root.innerHTML=`<div class="progress-wrap"><div class="progress-meta"><span>${escapeHtml(step.kicker)}</span><span>${state.step+1} / ${steps.length}</span></div><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div><div class="question"><div class="kicker">${escapeHtml(step.kicker)}</div><h1>${escapeHtml(step.title)}</h1><p class="question-copy">${escapeHtml(step.copy)}</p>${renderStepBody(step)}</div><div class="nav-row"><button class="btn secondary" data-action="back" ${state.step===0?"disabled":""}>Back</button><button class="btn primary" data-action="${step.type==="summary"?"finish":"next"}" ${canContinue(step)?"":"disabled"}>${step.type==="summary"?"Generate my meals":"Next"}</button></div>`;bind();}
      function renderStepBody(step){if(step.type==="summary")return renderSummary();const options=step.dynamicOptions?step.dynamicOptions():step.options;const gridClass=options.length>4?"option-grid two":"option-grid";return `<div class="${gridClass}">${options.map(opt=>renderOption(step,opt)).join("")}</div>${step.allowSkip?`<button class="option-btn" data-action="skip"><span class="option-main"><span class="option-title">Skip this for now</span><span class="option-sub">Use flexible options.</span></span><span class="check">✓</span></button>`:""}`;}
      function renderOption(step,opt){const[value,title,sub]=opt;const selected=isSelected(step.key,value);return `<button class="option-btn ${selected?"selected":""}" data-action="select" data-key="${escapeHtml(step.key)}" data-value="${escapeHtml(String(value))}"><span class="option-main"><span class="option-title">${escapeHtml(title)}</span><span class="option-sub">${escapeHtml(sub||"")}</span></span><span class="check">${selected?"✓":""}</span></button>`;}
      function renderSummary(){return `<div class="summary-grid">${summaryRow("Country",countryLabels[state.country]||"Other")}${summaryRow("Diet",state.dietType==="vegetarian"?"Vegetarian":"Meat")}${summaryRow("Proteins",listLabel(state.proteins))}${summaryRow("Breakfasts",listLabel(state.breakfast))}${summaryRow("Starches",listLabel(state.starches))}${summaryRow("Vegetables",listLabel(state.vegetables))}${summaryRow("Fruit",listLabel(state.fruits))}${summaryRow("Snack preferences",listLabel(state.snackPreferences))}</div>`;}
      function summaryRow(label,value){return `<div class="summary-row"><span>${escapeHtml(label)}</span><span>${escapeHtml(value||"Not set")}</span></div>`;}
      function listLabel(values){if(!values||!values.length)return "Flexible";return values.map(v=>String(v).replaceAll("_"," ")).join(", ");}
      function isSelected(key,value){return Array.isArray(state[key])?state[key].includes(value):state[key]===value;}
      function canContinue(step){if(step.type==="summary"||step.allowSkip)return true;const value=state[step.key];return Array.isArray(value)?value.length>0:Boolean(value);}
      function bind(){root.querySelectorAll("[data-action='select']").forEach(btn=>{btn.addEventListener("click",()=>{const key=btn.getAttribute("data-key");const value=btn.getAttribute("data-value");const step=steps[state.step];if(step.type==="multi"){state[key]=Array.isArray(state[key])?state[key]:[];state[key]=state[key].includes(value)?state[key].filter(v=>v!==value):state[key].concat(value);}else{state[key]=value;if(key==="dietType")state.proteins=[];}save();render();});});root.querySelector("[data-action='back']")?.addEventListener("click",()=>{if(state.step>0){state.step-=1;save();render();}});root.querySelector("[data-action='next']")?.addEventListener("click",()=>{const step=steps[state.step];if(!canContinue(step))return;state.step=Math.min(steps.length-1,state.step+1);save();render();});root.querySelector("[data-action='skip']")?.addEventListener("click",()=>{const step=steps[state.step];if(Array.isArray(state[step.key]))state[step.key]=[];else state[step.key]=null;state.step=Math.min(steps.length-1,state.step+1);save();render();});root.querySelector("[data-action='finish']")?.addEventListener("click",finish);}
      async function finish(){const normalized=buildNormalizedMealsState();writeJSON(UI_STATE_KEY,normalized.uiState);writeJSON(PAGE_STATE_KEY,normalized.pageState);writeJSON(PROFILE_KEY,normalized.pageState);writeJSON(ONBOARDING_KEY,Object.assign({},state,{completedAt:new Date().toISOString()}));try{if(window.HeartyMealsDB&&typeof window.HeartyMealsDB.saveMealPreferences==="function"){await window.HeartyMealsDB.saveMealPreferences(normalized.pageState);}}catch(error){console.warn("Preferences saved locally, database save failed:",error);}window.location.replace("meals.html?generate=1");}
      function buildNormalizedMealsState(){const country=state.country||"OTHER";const dietType=state.dietType||"omnivore";const onboarding={country,dietType,proteins:state.proteins||[],breakfast:state.breakfast||[],starches:state.starches||[],vegetables:state.vegetables||[],fruits:state.fruits||[],snackPreferences:state.snackPreferences||[],snacksEnabled:false,dinnerForLunch:false};const uiState={profileComplete:true,currentDayIndex:0,selectedCountry:country,country,dietType,snacksEnabled:false,dinnerForLunch:false,supportMode:false,supportProfile:null,onboarding,preferences:onboarding,weekPlan:[],lockedMeals:{},lastGeneratedAt:null,needsGenerate:true};const pageState=Object.assign({},uiState);return{uiState,pageState};}
      function save(){writeJSON(ONBOARDING_KEY,state);}function load(){try{const saved=localStorage.getItem(ONBOARDING_KEY);return saved?JSON.parse(saved):null;}catch(err){return null;}}
      function writeJSON(key,value){try{localStorage.setItem(key,JSON.stringify(value));}catch(e){}}
      function escapeHtml(value){return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
      render();
    })();
  </script>
</body>
</html>
